<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tomodatchi Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f13;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      color: #ccc;
    }
    h1 { font-size: 15px; font-weight: 500; margin-bottom: 10px; letter-spacing: 0.05em; color: #888; }
    #canvas {
      border: 1px solid #333;
      border-radius: 8px;
      display: block;
    }
    #hud {
      display: flex;
      gap: 24px;
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
    #status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
    #status.connected { background: #1D9E75; }
  </style>
</head>
<body>
  <h1>agar.io — autonomous simulation</h1>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <span><span id="status"></span><span id="connLabel">connecting…</span></span>
    <span id="cellCount">cells: —</span>
    <span id="tickLabel">tick: —</span>
    <span id="largest">largest: —</span>
  </div>

  <script>
    // ── Canvas setup ──────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // World dimensions (must match Go constants)
    const WORLD_W = 1200;
    const WORLD_H = 800;

    function resize() {
      const maxW = Math.min(window.innerWidth - 32, 1100);
      const scale = maxW / WORLD_W;
      canvas.width  = Math.round(WORLD_W * scale);
      canvas.height = Math.round(WORLD_H * scale);
      canvas.dataset.scale = scale;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── State ─────────────────────────────────────────────────────────────────
    let currentState = null;
    let prevState = null;
    let lastTickTime = 0;
    const TICK_MS = 1000 / 30; // matches server tick rate

    // ── WebSocket ─────────────────────────────────────────────────────────────
    const statusDot   = document.getElementById('status');
    const connLabel   = document.getElementById('connLabel');
    const cellCount   = document.getElementById('cellCount');
    const tickLabel   = document.getElementById('tickLabel');
    const largestSpan = document.getElementById('largest');

    function connect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        statusDot.className = 'connected';
        connLabel.textContent = 'connected';
      };

      ws.onmessage = (evt) => {
        prevState = currentState;
        currentState = JSON.parse(evt.data);
        lastTickTime = performance.now();

        // HUD
        cellCount.textContent  = `cells: ${currentState.cells.length}`;
        tickLabel.textContent  = `tick: ${currentState.tick}`;
        const biggest = currentState.cells.reduce((a, b) => a.r > b.r ? a : b, currentState.cells[0]);
        largestSpan.textContent = `largest: r=${Math.round(biggest?.r ?? 0)}`;
      };

      ws.onclose = () => {
        statusDot.className = '';
        connLabel.textContent = 'disconnected — reconnecting…';
        setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();

    // ── Interpolation helper ──────────────────────────────────────────────────
    // Smoothly blend between prev and current state for buttery rendering
    function lerp(a, b, t) { return a + (b - a) * t; }

    function interpCells(prev, curr, t) {
      if (!prev) return curr;
      // Build a map of prev cells by id for quick lookup
      const prevMap = {};
      for (const c of prev.cells) prevMap[c.id] = c;

      return curr.cells.map(c => {
        const p = prevMap[c.id];
        if (!p) return c;
        return { ...c, x: lerp(p.x, c.x, t), y: lerp(p.y, c.y, t), r: lerp(p.r, c.r, t) };
      });
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function draw() {
      requestAnimationFrame(draw);
      if (!currentState) return;

      const scale = parseFloat(canvas.dataset.scale) || 1;
      const W = canvas.width;
      const H = canvas.height;

      // Interpolation factor (0 → 1 between ticks)
      const t = Math.min((performance.now() - lastTickTime) / TICK_MS, 1);
      const cells   = interpCells(prevState, currentState, t);
      const pellets = currentState.pellets;

      // Background
      ctx.fillStyle = '#0f0f13';
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      const gridSize = 40 * scale;
      for (let x = 0; x < W; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Pellets
      for (const p of pellets) {
        ctx.beginPath();
        ctx.arc(p.x * scale, p.y * scale, p.r * scale, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }

      // Cells (sorted smallest first so bigger ones render on top)
      const sorted = [...cells].sort((a, b) => a.r - b.r);
      for (const c of sorted) {
        const cx = c.x * scale;
        const cy = c.y * scale;
        const cr = c.r * scale;

        // Cell body
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.fillStyle = c.color + 'bb';
        ctx.fill();
        ctx.strokeStyle = c.color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Size label inside cell
        if (cr > 14) {
          ctx.fillStyle = '#fff';
          ctx.font = `${Math.min(12, cr * 0.35)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(Math.round(c.r), cx, cy);
        }
      }
    }

    draw();
  </script>
</body>
</html>
