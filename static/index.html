<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulation de Civilisation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="start-panel">
    <div class="start-kicker">Nouvelle simulation</div>
    <h2>Choisir un objectif</h2>
    <div class="start-options">
      <button class="start-option selected" data-objective="normal">
        <span>Civilisation normale</span>
        <small>Toutes les victoires sont possibles</small>
      </button>
      <button class="start-option" data-objective="domination">
        <span>Domination</span>
        <small>Gagner en eliminant les autres civilisations</small>
      </button>
      <button class="start-option" data-objective="science">
        <span>Science</span>
        <small>Gagner grace aux technologies</small>
      </button>
      <button class="start-option" data-objective="culture">
        <span>Culture</span>
        <small>Gagner avec les merveilles du monde</small>
      </button>
      <button class="start-option" data-objective="time">
        <span>Temps</span>
        <small>Gagner aux points a la fin du temps</small>
      </button>
    </div>
    <button class="start-launch" id="startBtn">DEMARRER</button>
  </div>
</div>

<header>
  <h1>TAMAGOTCHI HIVE</h1>
  <div class="conn">
    <div class="dot" id="dot"></div>
    <span id="connLbl">connexion...</span>
  </div>
</header>

<div class="main">

  <!-- Carte -->
  <div class="map-col">
    <div id="mapWrap">
      <canvas id="map"></canvas>
      <div id="tooltip"></div>
    </div>

    <!-- Legende terrain -->
    <div class="panel legend-panel">
      <div class="panel-title">Legende - Terrain</div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- Barre laterale -->
  <div class="sidebar">

    <!-- Tour -->
    <div class="panel tour-panel">
      <div class="turn-label">TOUR</div>
      <div class="turn-num" id="turnNum">-</div>
      <div class="turn-label" id="eraLabel">-</div>
    </div>

    <div class="panel">
      <div class="panel-title">Classement Mondial</div>
      <div id="powerBoard"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Progression Victoire</div>
      <div id="victoryBoard"></div>
    </div>

    <!-- Civilisations -->
    <div class="panel">
      <div class="panel-title">Civilisations</div>
      <div id="civList"></div>
    </div>

    <!-- Merveilles -->
    <div class="panel">
      <div class="panel-title">Merveilles du Monde</div>
      <div id="wonderList"></div>
    </div>

    <!-- Journal d'evenements -->
    <div class="panel">
      <div class="panel-title">Journal des Evenements</div>
      <div class="events" id="eventLog"></div>
    </div>

    <!-- Boutons -->
    <button class="btn-action" id="techTreeBtn">ARBRE TECHNOLOGIQUE</button>
    <button class="btn-action" id="restartBtn">NOUVEAU MONDE</button>

  </div>
</div>

<!-- Modal arbre technologique -->
<div id="techModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">ARBRE TECHNOLOGIQUE</span>
      <button class="modal-close" id="closeTechBtn">Fermer</button>
    </div>
    <div class="tech-era-labels" id="eraLabels"></div>
    <div class="tech-canvas-wrap">
      <canvas id="techCanvas"></canvas>
    </div>
    <div class="tech-legend">
      <span class="tech-leg-item"><span class="tech-leg-known"></span> Decouverte</span>
      <span class="tech-leg-item"><span class="tech-leg-unknown"></span> Non decouverte</span>
      <span class="tech-leg-item">Points colores = civilisations qui possedent la tech</span>
    </div>
  </div>
</div>

<script src="the.js"></script>
</body>
</html>
