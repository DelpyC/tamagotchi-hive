<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulation de Civilisation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SIMULATION DE CIVILISATION</h1>
  <div class="conn">
    <div class="dot" id="dot"></div>
    <span id="connLbl">connexion…</span>
  </div>
</header>

<div class="main">

  <!-- Carte -->
  <div class="map-col">
    <div id="mapWrap">
      <canvas id="map"></canvas>
      <div id="tooltip"></div>
    </div>

    <!-- Légende terrain -->
    <div class="panel legend-panel">
      <div class="panel-title">Légende — Terrain</div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- Barre latérale -->
  <div class="sidebar">

    <!-- Tour -->
    <div class="panel tour-panel">
      <div class="turn-label">TOUR</div>
      <div class="turn-num" id="turnNum">—</div>
      <div class="turn-label" id="eraLabel">—</div>
    </div>

    <div class="panel">
      <div class="panel-title">Classement Mondial</div>
      <div id="powerBoard"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Progression Victoire</div>
      <div id="victoryBoard"></div>
    </div>

    <!-- Civilisations -->
    <div class="panel">
      <div class="panel-title">Civilisations</div>
      <div id="civList"></div>
    </div>

    <!-- Merveilles -->
    <div class="panel">
      <div class="panel-title">Merveilles du Monde</div>
      <div id="wonderList"></div>
    </div>

    <!-- Journal d'événements -->
    <div class="panel">
      <div class="panel-title">Journal des Événements</div>
      <div class="events" id="eventLog"></div>
    </div>

    <!-- Boutons -->
    <button class="btn-action" id="techTreeBtn">🔬 ARBRE TECHNOLOGIQUE</button>
    <button class="btn-action" id="restartBtn">🌍 NOUVEAU MONDE</button>

  </div>
</div>

<!-- ── Modal arbre technologique ── -->
<div id="techModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <span class="modal-title">ARBRE TECHNOLOGIQUE</span>
      <button class="modal-close" id="closeTechBtn">✕ Fermer</button>
    </div>
    <div class="tech-era-labels" id="eraLabels"></div>
    <div class="tech-canvas-wrap">
      <canvas id="techCanvas"></canvas>
    </div>
    <div class="tech-legend">
      <span class="tech-leg-item"><span class="tech-leg-known"></span> Découverte</span>
      <span class="tech-leg-item"><span class="tech-leg-unknown"></span> Non découverte</span>
      <span class="tech-leg-item">● Points colorés = civilisations qui possèdent la tech</span>
    </div>
  </div>
</div>

<script src="the.js"></script>
</body>
</html>
