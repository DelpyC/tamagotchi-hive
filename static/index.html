<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Civilization Simulation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <script src="the.js" defer></script>
</head>
<body>

<header>
  <h1>CIVILIZATION SIMULATION — PHASE I</h1>
  <div class="conn"><div class="dot" id="dot"></div><span id="connLbl">connecting…</span></div>
</header>

<div class="main">
  <!-- Map -->
  <div id="mapWrap">
    <canvas id="map"></canvas>
    <div id="tooltip"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="panel" style="text-align:center;">
      <div class="turn-label">TURN</div>
      <div class="turn-num" id="turnNum">—</div>
    </div>

    <div class="panel">
      <div class="panel-title">Civilizations</div>
      <div id="civList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Event Log</div>
      <div class="events" id="eventLog"></div>
    </div>

    <div class="panel">
  <div class="panel-title">Wonders</div>
  <div id="wonders-sidebar"></div>
</div>

    <div class="panel">
      <div class="panel-title">Terrain Legend</div>
      <div class="legend" id="legend"></div>
    </div>

    <button id="open-tech-tree">TECH TREE</button>

    <button class="restart" id="restartBtn">NEW WORLD</button>
  </div>
</div>

<div id="tech-modal" class="modal">
  <div class="modal-content">
    <button id="close-tech-tree">X</button>
    <canvas id="tech-canvas" width="800" height="600"></canvas>
  </div>
</div>

</body>
</html>
